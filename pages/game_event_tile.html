
<style>
#wrap { position: relative; width: 560px; margin: 0 auto; }
#game-canvas {
  background: #1a1a2e;
  border-radius: var(--border-radius-lg);
  border: 0.5px solid var(--color-border-secondary);
  display: block;
  image-rendering: pixelated;
}
#event-screen {
  display: none;
  position: absolute;
  top: 0; left: 0;
  width: 560px; height: 360px;
  background: #0a0a1a;
  border-radius: var(--border-radius-lg);
  border: 0.5px solid #378ADD;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 10;
}
#event-screen.show { display: flex; }
.ev-title { font-size: 22px; font-weight: 500; color: #E6F1FB; }
.ev-desc  { font-size: 14px; color: #85B7EB; text-align: center; line-height: 1.7; }
.ev-btn {
  padding: 10px 28px;
  border: 0.5px solid #378ADD;
  border-radius: var(--border-radius-md);
  background: transparent;
  color: #85B7EB;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.ev-btn:hover { background: #0C447C; color: #E6F1FB; }
.key-display { display:flex; gap:6px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
.key { padding:4px 10px; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); font-size:13px; color:var(--color-text-secondary); background:var(--color-background-secondary); transition:background 0.1s,color 0.1s; min-width:36px; text-align:center; }
.key.active { background:#378ADD; color:#E6F1FB; border-color:#185FA5; }
.btn-row { display:grid; grid-template-columns:repeat(3,40px); gap:4px; justify-content:center; margin-top:12px; }
.dpad { width:40px;height:40px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;transition:background 0.08s; }
.dpad:active,.dpad.pressed { background:#378ADD; color:#E6F1FB; }
.dpad-empty { visibility:hidden; }
#hud { display:flex; justify-content:center; gap:24px; margin-top:8px; font-size:13px; color:var(--color-text-secondary); }
#hud span b { color:var(--color-text-primary); font-weight:500; }
</style>

<div id="wrap">
  <canvas id="game-canvas" width="560" height="360"></canvas>

  <div id="event-screen">
    <div class="ev-title" id="ev-title">이벤트 발생!</div>
    <div class="ev-desc"  id="ev-desc">내용</div>
    <button class="ev-btn" id="ev-close">계속하기</button>
  </div>
</div>

<div id="hud">
  <span>걸음 수: <b id="hud-steps">0</b></span>
  <span>다음 이벤트까지: <b id="hud-next">10</b>걸음</span>
  <span>이벤트 위치: <b id="hud-pos">-</b></span>
</div>

<div class="key-display">
  <span id="key-w" class="key">W</span><span id="key-a" class="key">A</span>
  <span id="key-s" class="key">S</span><span id="key-d" class="key">D</span>
  <span style="color:var(--color-text-tertiary);font-size:13px;align-self:center">또는</span>
  <span id="key-up" class="key">↑</span><span id="key-left" class="key">←</span>
  <span id="key-down" class="key">↓</span><span id="key-right" class="key">→</span>
</div>
<div class="btn-row">
  <div class="dpad-empty"></div>
  <button class="dpad" id="btn-up">↑</button>
  <div class="dpad-empty"></div>
  <button class="dpad" id="btn-left">←</button>
  <button class="dpad" id="btn-down">↓</button>
  <button class="dpad" id="btn-right">→</button>
</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const eventScreen = document.getElementById('event-screen');
const evTitle = document.getElementById('ev-title');
const evDesc  = document.getElementById('ev-desc');
const evClose = document.getElementById('ev-close');
const hudSteps = document.getElementById('hud-steps');
const hudNext  = document.getElementById('hud-next');
const hudPos   = document.getElementById('hud-pos');

const TILE = 40;
const COLS = canvas.width / TILE;
const ROWS = canvas.height / TILE;

// ✅ 이벤트 목록 (랜덤으로 하나 선택)
const EVENTS = [
  { title: '보물 발견!', desc: '낡은 상자를 열었더니\n반짝이는 동전이 가득하다.' },
  { title: '몬스터 출현!', desc: '어둠 속에서 눈이 빛난다.\n발소리가 점점 가까워진다.' },
  { title: '신비한 샘', desc: '맑은 물이 솟아나는 샘을 발견했다.\n기운이 회복되는 느낌이다.' },
  { title: '수상한 상인', desc: '"싸게 드리죠" 후드를 쓴 상인이\n의심스러운 물건을 내민다.' },
  { title: '함정 발동!', desc: '발 아래서 "딸깍" 소리가 들린다.\n다음 발걸음을 조심해야 한다.' },
];

// ✅ 이벤트 타일 상태
const eventTile = { col: -1, row: -1 };
let stepCount = 0;
let stepsToNext = 10;
let gameBlocked = false; // 이벤트 화면 중 입력 차단
let pulseT = 0; // 이벤트 타일 애니메이션

const player = { col: Math.floor(COLS/2), row: Math.floor(ROWS/2), dir:'down', size:28, frame:0 };
const anim   = { moving:false, fromX:0, fromY:0, toX:0, toY:0, progress:0, duration:8 };
let nextMove = null;
const keys = {};

const obstacles = [
  {c:3,r:2,w:2,h:1},{c:10,r:5,w:2,h:1},{c:5,r:7,w:1,h:2},
  {c:8,r:1,w:1,h:1},{c:1,r:5,w:1,h:2},{c:11,r:2,w:2,h:2},
];

function isBlocked(col, row) {
  if (col<0||col>=COLS||row<0||row>=ROWS) return true;
  for (const o of obstacles) {
    if (col>=o.c&&col<o.c+o.w&&row>=o.r&&row<o.r+o.h) return true;
  }
  return false;
}

// ✅ 이벤트 타일 위치 랜덤 재배치 (장애물·플레이어 위치 제외)
function placeEventTile() {
  let c, r;
  do {
    c = Math.floor(Math.random() * COLS);
    r = Math.floor(Math.random() * ROWS);
  } while (isBlocked(c, r) || (c === player.col && r === player.row));
  eventTile.col = c;
  eventTile.row = r;
  hudPos.textContent = `(${c}, ${r})`;
}

// ✅ 이벤트 화면 표시
function triggerEvent() {
  gameBlocked = true;
  nextMove = null;
  const ev = EVENTS[Math.floor(Math.random() * EVENTS.length)];
  evTitle.textContent = ev.title;
  evDesc.textContent  = ev.desc;
  eventScreen.classList.add('show');
}

// ✅ 이벤트 화면 닫기 → 새 이벤트 타일 배치
evClose.addEventListener('click', () => {
  eventScreen.classList.remove('show');
  gameBlocked = false;
  stepsToNext = 10;
  placeEventTile();
  updateHud();
});

function updateHud() {
  hudSteps.textContent = stepCount;
  hudNext.textContent  = stepsToNext;
}

function tryMove(dc, dr, dir) {
  if (gameBlocked) return;
  player.dir = dir;
  const nc = player.col + dc;
  const nr = player.row + dr;
  if (isBlocked(nc, nr)) return;

  anim.moving = true;
  anim.fromX = player.col * TILE;
  anim.fromY = player.row * TILE;
  anim.toX   = nc * TILE;
  anim.toY   = nr * TILE;
  anim.progress = 0;
  player.col = nc;
  player.row = nr;
}

// ✅ 이동 완료 시: 걸음 수 증가 + 이벤트 체크
function onStepComplete() {
  stepCount++;
  stepsToNext--;
  updateHud();

  // 10걸음마다 이벤트 타일 위치 변경
  if (stepsToNext <= 0) {
    stepsToNext = 10;
    placeEventTile();
  }

  // 이벤트 타일 위에 올라섰는지 확인
  if (player.col === eventTile.col && player.row === eventTile.row) {
    triggerEvent();
    eventTile.col = -1;
    eventTile.row = -1;
    hudPos.textContent = '-';
  }
}

function drawTile(c, r) {
  ctx.fillStyle = (c+r)%2===0 ? '#16213e' : '#0f3460';
  ctx.fillRect(c*TILE, r*TILE, TILE, TILE);
}

// ✅ 이벤트 타일 그리기 (깜빡이는 별 모양)
function drawEventTile() {
  if (eventTile.col < 0) return;
  pulseT += 0.08;
  const cx = eventTile.col * TILE + TILE/2;
  const cy = eventTile.row * TILE + TILE/2;
  const pulse = 0.7 + Math.sin(pulseT) * 0.3;

  // 배경 글로우
  ctx.save();
  ctx.globalAlpha = 0.25 * pulse;
  ctx.fillStyle = '#EF9F27';
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // 별 모양
  ctx.fillStyle = `rgba(239,159,39,${0.6 + 0.4 * pulse})`;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(pulseT * 0.5);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI) / 5 - Math.PI/2;
    const b = a + (2 * Math.PI) / 10;
    ctx.lineTo(Math.cos(a)*12*pulse, Math.sin(a)*12*pulse);
    ctx.lineTo(Math.cos(b)*5,        Math.sin(b)*5);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  ctx.restore();

  // 물음표
  ctx.fillStyle = '#FAEEDA';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', cx, cy + 14);
}

function drawObstacle(o) {
  ctx.fillStyle = '#2d6a4f';
  ctx.fillRect(o.c*TILE+2, o.r*TILE+2, o.w*TILE-4, o.h*TILE-4);
  ctx.fillStyle = '#40916c';
  ctx.fillRect(o.c*TILE+2, o.r*TILE+2, o.w*TILE-4, 6);
  ctx.strokeStyle = '#1b4332'; ctx.lineWidth = 1;
  ctx.strokeRect(o.c*TILE+2, o.r*TILE+2, o.w*TILE-4, o.h*TILE-4);
}

function drawCharacter(px, py) {
  const x = px + TILE/2 - player.size/2;
  const y = py + TILE/2 - player.size/2;
  const s = player.size, f = player.frame;
  const isM = anim.moving;
  const legOff = isM ? Math.sin(f*1.5)*4 : 0;
  const armOff = isM ? Math.sin(f*1.5)*5 : 0;
  const bobY   = isM ? Math.abs(Math.sin(f*1.5))*2 : 0;
  ctx.save(); ctx.translate(x, y - bobY);
  if (player.dir==='left') {
    ctx.shadowColor='#378ADD';ctx.shadowBlur=10;ctx.fillStyle='#4a90d9';ctx.fillRect(-5,4,4,12);ctx.fillRect(s/2+1,4+armOff,4,12);ctx.shadowBlur=0;ctx.fillStyle='#e8c99a';ctx.fillRect(-5,16,4,8);ctx.fillRect(s/2+1,16+armOff,4,8);ctx.fillStyle='#2c5282';ctx.fillRect(2,s*0.55,10,14);ctx.fillRect(s/2-12,s*0.55,10,14);ctx.fillStyle='#1a1a2e';ctx.fillRect(2,s*0.55+14-legOff,10,6);ctx.fillRect(s/2-12,s*0.55+14+legOff,10,6);ctx.shadowColor='#378ADD';ctx.shadowBlur=6;ctx.fillStyle='#4a90d9';ctx.fillRect(0,s*0.18,s/2,s*0.42);ctx.shadowBlur=0;ctx.fillStyle='#e8c99a';ctx.fillRect(2,-2,s/2-4,s*0.22);ctx.fillStyle='#1a1a2e';ctx.fillRect(4,2,6,4);ctx.fillStyle='#e8c99a';ctx.beginPath();ctx.arc(s/4,-s*0.12,s*0.22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2c1810';ctx.fillRect(0,-s*0.28,s/2,s*0.1);
  } else if (player.dir==='right') {
    ctx.shadowColor='#378ADD';ctx.shadowBlur=10;ctx.fillStyle='#4a90d9';ctx.fillRect(-5,4+armOff,4,12);ctx.fillRect(s/2+1,4,4,12);ctx.shadowBlur=0;ctx.fillStyle='#e8c99a';ctx.fillRect(-5,16+armOff,4,8);ctx.fillRect(s/2+1,16,4,8);ctx.fillStyle='#2c5282';ctx.fillRect(2,s*0.55,10,14);ctx.fillRect(s/2-12,s*0.55,10,14);ctx.fillStyle='#1a1a2e';ctx.fillRect(2,s*0.55+14+legOff,10,6);ctx.fillRect(s/2-12,s*0.55+14-legOff,10,6);ctx.shadowColor='#378ADD';ctx.shadowBlur=6;ctx.fillStyle='#4a90d9';ctx.fillRect(0,s*0.18,s/2,s*0.42);ctx.shadowBlur=0;ctx.fillStyle='#e8c99a';ctx.fillRect(2,-2,s/2-4,s*0.22);ctx.fillStyle='#1a1a2e';ctx.fillRect(s/2-10,2,6,4);ctx.fillStyle='#e8c99a';ctx.beginPath();ctx.arc(s/4,-s*0.12,s*0.22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2c1810';ctx.fillRect(0,-s*0.28,s/2,s*0.1);
  } else if (player.dir==='up') {
    ctx.fillStyle='#2c5282';ctx.fillRect(2,s*0.55,10,14);ctx.fillRect(s/2-12,s*0.55,10,14);ctx.fillStyle='#1a1a2e';ctx.fillRect(2,s*0.55+14-legOff,10,6);ctx.fillRect(s/2-12,s*0.55+14+legOff,10,6);ctx.shadowColor='#378ADD';ctx.shadowBlur=10;ctx.fillStyle='#4a90d9';ctx.fillRect(-5,4+armOff,4,18);ctx.fillRect(s/2+1,4-armOff,4,18);ctx.shadowBlur=6;ctx.fillStyle='#4a90d9';ctx.fillRect(0,s*0.18,s/2,s*0.42);ctx.shadowBlur=0;ctx.fillStyle='#2c1810';ctx.fillRect(0,-s*0.28,s/2,s*0.22);ctx.fillStyle='#e8c99a';ctx.beginPath();ctx.arc(s/4,-s*0.12,s*0.22,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle='#2c5282';ctx.fillRect(2,s*0.55,10,14);ctx.fillRect(s/2-12,s*0.55,10,14);ctx.fillStyle='#1a1a2e';ctx.fillRect(2,s*0.55+14+legOff,10,6);ctx.fillRect(s/2-12,s*0.55+14-legOff,10,6);ctx.shadowColor='#378ADD';ctx.shadowBlur=10;ctx.fillStyle='#4a90d9';ctx.fillRect(-5,4-armOff,4,18);ctx.fillRect(s/2+1,4+armOff,4,18);ctx.shadowBlur=6;ctx.fillStyle='#4a90d9';ctx.fillRect(0,s*0.18,s/2,s*0.42);ctx.shadowBlur=0;ctx.fillStyle='#e8c99a';ctx.fillRect(2,-2,s/2-4,s*0.22);ctx.fillStyle='#1a1a2e';ctx.fillRect(4,2,5,3);ctx.fillRect(s/2-9,2,5,3);ctx.fillStyle='#e8c99a';ctx.beginPath();ctx.arc(s/4,-s*0.12,s*0.22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2c1810';ctx.fillRect(0,-s*0.28,s/2,s*0.1);ctx.fillStyle='#e74c3c';ctx.fillRect(-2,-s*0.32,s/2+4,5);
  }
  ctx.restore();
}

function loop() {
  let px, py;
  if (anim.moving) {
    anim.progress++; player.frame++;
    const t = anim.progress / anim.duration;
    px = anim.fromX + (anim.toX - anim.fromX) * t;
    py = anim.fromY + (anim.toY - anim.fromY) * t;
    if (anim.progress >= anim.duration) {
      anim.moving = false; px = anim.toX; py = anim.toY; player.frame = 0;
      onStepComplete(); // ✅ 한 칸 이동 완료
      if (!gameBlocked && nextMove) tryMove(nextMove.dc, nextMove.dr, nextMove.dir);
    }
  } else {
    px = player.col * TILE; py = player.row * TILE; player.frame = 0;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) drawTile(c,r);
  drawEventTile(); // ✅ 이벤트 타일 (장애물 아래, 캐릭터 위)
  for (const o of obstacles) drawObstacle(o);
  drawCharacter(px, py);
  requestAnimationFrame(loop);
}

// 키 입력
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  const map = {
    'ArrowUp':{dc:0,dr:-1,dir:'up',kid:'key-up'},'ArrowDown':{dc:0,dr:1,dir:'down',kid:'key-down'},
    'ArrowLeft':{dc:-1,dr:0,dir:'left',kid:'key-left'},'ArrowRight':{dc:1,dr:0,dir:'right',kid:'key-right'},
    'w':{dc:0,dr:-1,dir:'up',kid:'key-w'},'W':{dc:0,dr:-1,dir:'up',kid:'key-w'},
    's':{dc:0,dr:1,dir:'down',kid:'key-s'},'S':{dc:0,dr:1,dir:'down',kid:'key-s'},
    'a':{dc:-1,dr:0,dir:'left',kid:'key-a'},'A':{dc:-1,dr:0,dir:'left',kid:'key-a'},
    'd':{dc:1,dr:0,dir:'right',kid:'key-d'},'D':{dc:1,dr:0,dir:'right',kid:'key-d'},
  };
  const m = map[e.key]; if (!m) return;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  document.getElementById(m.kid)?.classList.add('active');
  nextMove = m;
  if (!anim.moving && !gameBlocked) tryMove(m.dc, m.dr, m.dir);
});
document.addEventListener('keyup', e => {
  keys[e.key] = false;
  const dk=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','W','s','S','a','A','d','D'];
  if (dk.includes(e.key)&&!dk.some(k=>keys[k])) nextMove=null;
  const km={'ArrowUp':'key-up','ArrowDown':'key-down','ArrowLeft':'key-left','ArrowRight':'key-right','w':'key-w','W':'key-w','s':'key-s','S':'key-s','a':'key-a','A':'key-a','d':'key-d','D':'key-d'};
  document.getElementById(km[e.key])?.classList.remove('active');
});
const btnMap={'btn-up':{dc:0,dr:-1,dir:'up'},'btn-down':{dc:0,dr:1,dir:'down'},'btn-left':{dc:-1,dr:0,dir:'left'},'btn-right':{dc:1,dr:0,dir:'right'}};
for(const[id,m] of Object.entries(btnMap)){
  const btn=document.getElementById(id);
  const start=()=>{nextMove=m;btn.classList.add('pressed');if(!anim.moving&&!gameBlocked)tryMove(m.dc,m.dr,m.dir);};
  const end=()=>{nextMove=null;btn.classList.remove('pressed');};
  btn.addEventListener('mousedown',start);
  btn.addEventListener('touchstart',e=>{e.preventDefault();start();},{passive:false});
  btn.addEventListener('mouseup',end);btn.addEventListener('mouseleave',end);btn.addEventListener('touchend',end);
}

// 초기 이벤트 타일 배치
placeEventTile();
updateHud();
loop();
</script>
